services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: emission-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: emission_assessment
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - emission-network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: emission-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - emission-network

  # 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: emission-backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: emission_assessment
      DB_USERNAME: root
      DB_PASSWORD: "123456"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "vehicle-emission-secret-key-dev"
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - emission-network

  # 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: emission-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - emission-network

volumes:
  mysql-data:
  redis-data:

networks:
  emission-network:
    driver: bridge
